<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="Box_model.css">
    <title>BOX MODEL PAGE</title>
</head>

<body>

    <header>
        <div class="box_header">
            <h2 style="color: black; font-weight: 500; margin-left: 20px;">Box Model</h2>
        </div>
    </header>

    <br>

    <main>
        <div class="main_body_box">
            <h4 style="margin-left: 20px;">Every element on the page has its own box, which can be styled using CSS.</h4>
        </div>

        <br>

        <div class="main_body_box">
            <h4 style="margin-left: 20px;">From the inside out: </h4>
        </div>

        <div>
            <ul>
                <li class="list_style" >content</li>
                <li style="color: #dc9edb;">padding</li>
                <li class="list_style">border</li>
                <li style="color: #dc9edb;">margin</li>
            </ul>
        </div>
    </main>

    <footer>
        <h2>Background</h2>
        <br>
        <div class="footer_box">
            <h4 style="margin-left: 20px;">Keep in mind that a <span class="footer_inner_box">background</span> will cover the content and the padding.</h4>
        </div>
    </footer>

</body>

</html>
