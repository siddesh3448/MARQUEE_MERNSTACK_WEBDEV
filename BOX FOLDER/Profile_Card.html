<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Carde Making</title>
    <link rel="stylesheet" href="ProfileCard.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body>

    <div class="Card">

        <div class="Top_Section">

            <img src="PROFILE_HEADSHOU.png" alt="Profile Image" id="my_image">
        </div>

        <div class="Content">

            <div class="Content">

                <h2>CodingLab</h2>
                <h4>YouTuber & Blogger</h4>

                <div class="Social_icon">
                    <a href="#"><i class="fa-brands fa-facebook-f"></i></a>
                    <a href="#"><i class="fa-brands fa-twitter"></i></a>
                    <a href="#"><i class="fa-brands fa-instagram"></i></a>
                    <a href="#"><i class="fa-brands fa-youtube"></i></a>
                </div>

                <div class="buttons">
                    <button>Subscribe</button>
                    <button>Message</button>
                </div>

                <div class="stats">
                    <span><i class="fa-regular fa-heart"></i> 60.4k</span>
                    <span><i class="fa-regular fa-comment"></i> 20k</span>
                    <span><i class="fa-solid fa-share"></i> 12.4k</span>
                </div>

            </div>
        </div>
    </div>

</body>

</html>
