<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flipkart Clone</title>

    <link rel="icon" type="image/x-icon"
        href="https://img.logo.dev/flipkart.com?token=live_6a1a28fd-6420-4492-aeb0-b297461d9de2&size=512&retina=true&format=png">

    <link rel="stylesheet" href="index_styling.css">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>

<body>

    <header>

        <div class="navbar">

            <!-- Logo -->

            <div class="logo">

                <img src="assets/flipkart-logo.png" alt="Flipkart Logo">

                <div class="logo-text">
                    <span>Explore</span>
                    <span class="plus">Plus</span>
                    <i class="fa-solid fa-plus"></i>
                </div>

            </div>


            <!-- Search -->

            <div class="search">

                <i class="fa-solid fa-magnifying-glass"></i>

                <input type="text" placeholder="Search for Products, Brands and More">

            </div>


            <!-- Location -->

            <div class="location">

                <i class="fa-solid fa-location-dot"></i>

                <div class="location-text">
                    <small>Location not set</small>
                    <p>Select delivery location</p>
                </div>

            </div>


            <!-- Login -->

            <div class="login">

                <i class="fa-regular fa-circle-user"></i>

                <span>Login</span>

                <i class="fa-solid fa-chevron-down"></i>

            </div>


            <!-- Seller -->

            <div class="seller">

                <i class="fa-solid fa-store"></i>

                <span>Become a Seller</span>

            </div>


            <!-- More -->

            <div class="more">

                <span>More</span>

                <i class="fa-solid fa-chevron-down"></i>

            </div>


            <!-- Cart -->

            <div class="cart">

                <i class="fa-solid fa-cart-shopping"></i>

                <span>Cart</span>

            </div>


            <!-- Menu -->

            <div class="menu">

                <i class="fa-solid fa-ellipsis-vertical"></i>

            </div>

        </div>

    </header>

    <main>

        <section class="categories">
            <div class="category">
                <img src="assets/for_you.svg" alt="For You">
                <span>For You</span>
            </div>

            <div class="category">
                <img src="assets/fashion.svg" alt="fashion">
                <span>Fashion</span>
            </div>

            <div class="category">
                <img src="assets/mobiles.svg" alt="mobiles">
                <span>Mobiles</span>
            </div>

            <div class="category">
                <img src="assets/electronics.svg" alt="electronics">
                <span>Electronics</span>
            </div>

            <div class="category">
                <img src="assets/beauty.svg" alt="beauty">
                <span>Beauty</span>
            </div>

            <div class="category">
                <img src="assets/home.svg" alt="home">
                <span>Home</span>
            </div>

            <div class="category">
                <img src="assets/tv.svg" alt="tv">
                <span>Appliances</span>
            </div>

            <div class="category">
                <img src="assets/toy.svg" alt="toy">
                <span>Toys, baby..</span>
            </div>

            <div class="category">
                <img src="assets/food.svg" alt="food">
                <span>food & Health</span>
            </div>

            <div class="category">
                <img src="assets/auto-acc.svg" alt="auto-acc">
                <span>Auto Accessories</span>
            </div>

            <div class="category">
                <img src="assets/sport.svg" alt="sport">
                <span>Sport & Fitness</span>
            </div>

            <div class="category">
                <img src="assets/furniture.svg" alt="furniture">
                <span>Furniture</span>
            </div>

            <div class="category">
                <img src="assets/books.svg" alt="books">
                <span>Books & More</span>
            </div>

            <div class="category">
                <img src="assets/two-wheelers.svg" alt="auto-new">
                <span>2 Wheelers</span>
            </div>
        </section>

        <!-- HERO BANNER -->
         
        <section class="hero">
            <div class="hero-slider">
                <img src="assets/banner1.jpg" alt="Hero-Banner">
            </div>
        </section>

        <section class="offers">
            
        </section>

        <section class="suggested-products">

        </section>

        <section class="best-deals">

        </section>

        <section class="electronics">

        </section>
    </main>

    <footer>

    </footer>

</body>

</html>
