<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Technology Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>

<body>

    <!DOCTYPE html>
    <html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Technology Dashboard</title>
        <link rel="stylesheet" href="style.css">
    </head>

    <body>

        <main class="dashboard">

            <aside class="sidebar">

                <h2 class="sidebar-title">
                    Technologies
                </h2>

                <nav class="sidebar-menu">

                    <button class="menu-item active">
                        Frontend
                    </button>

                    <button class="menu-item">
                        Backend
                    </button>

                    <button class="menu-item">
                        Mobile
                    </button>

                    <button class="menu-item">
                        Platforms
                    </button>

                    <button class="menu-item">
                        Databases
                    </button>

                </nav>

            </aside>

            <section class="content">

                <div class="content-header">

                    <div class="header-title">

                        <div class="header-icon">
                            <i class="fa-solid fa-desktop"></i>
                        </div>

                        <div class="title-box">
                            <h1>Frontend</h1>
                            <span class="title-line"></span>
                        </div>

                    </div>

                </div>

                <div class="technology-grid">

                    <article class="technology-card">

                        <div class="card-image">

                        </div>

                        <h3>AngularJS</h3>
                        <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/angularjs/angularjs-original.svg" alt="AngularJS">

                    </article>

                    <article class="technology-card">

                        <div class="card-image">

                        </div>

                        <h3>ReactJS</h3>
                        <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/react/react-original.svg" alt="ReactJS">

                    </article>

                    <article class="technology-card">

                        <div class="card-image">

                        </div>

                        <h3>Vue.js</h3>
                        <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/vuejs/vuejs-original.svg" alt="VueJS">

                    </article>

                    <article class="technology-card">

                        <div class="card-image">

                        </div>

                        <h3>JavaScript</h3>
                        <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/javascript/javascript-original.svg" alt="JavaScript">

                    </article>

                    <article class="technology-card">

                        <div class="card-image">

                        </div>

                        <h3>CSS3</h3>
                        <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/css3/css3-original.svg" alt="CSS3">

                    </article>

                    <article class="technology-card">

                        <div class="card-image">

                        </div>

                        <h3>HTML5</h3>
                        <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/html5/html5-original.svg" alt="HTML5">

                    </article>

                    <article class="technology-card">

                        <div class="card-image">

                        </div>

                        <h3>Next.js</h3>
                        <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/nextjs/nextjs-original.svg" alt="NextJS">

                    </article>

                </div>

            </section>

        </main>

        <footer>



        </footer>

    </body>

    </html>

</body>

</html>
