<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COMPLEX TABLE</title>
    <style>
        table,
        th,
        td {
            border: 1px solid black;
        }
    </style>
</head>

<body>
    <h1><em><u>COMPLEX TABLE</u></em></h1>

    <table>
        <thead>
            <tr>
                <td>
                    <strong>Column 1</strong>
                </td>

                <td>
                    <strong>Column 2</strong>
                </td>

                <td>
                    <strong>Column 3</strong>
                </td>
            </tr>
        </thead>

        
            <tr>
                <td rowspan="2">Row1 cell1</td>
                <td>Row1 Cell2</td>
                <td>Row1 Cell3</td>
            </tr>
        

        <tr>
            <td>Row2 Cell2</td>
            <td>Row2 Cell3</td>
        </tr>

        <tr>
            <td colspan="3">Row 3 Cell 1</td>
        </tr>
    </table>
</body>

</html>
